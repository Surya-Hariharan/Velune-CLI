# Automatically run formatting and linting before commit
exclude: |
  (?x)^(
    velune/__pycache__|
    \.git/|
    \.venv/|
    dist/|
    build/|
  )

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/pyright-lang/pyright
    rev: 1.1.350
    hooks:
      - id: pyright

  # Local secret scan, pre-push only — see .githooks/pre-push-secret-scan.sh
  # for why this runs at push time (not commit time) and how it degrades
  # gracefully when gitleaks isn't installed. CI's gitleaks step is the real
  # gate; this just catches a secret before it ever leaves your machine.
  # Requires `pre-commit install --hook-type pre-push` in addition to the
  # default `pre-commit install` — see CONTRIBUTING.md.
  - repo: local
    hooks:
      - id: gitleaks-pre-push
        name: Secret scan (gitleaks, pre-push)
        language: script
        entry: .githooks/pre-push-secret-scan.sh
        stages: [pre-push]
        pass_filenames: false
