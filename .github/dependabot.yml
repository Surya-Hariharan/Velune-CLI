version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "suryahariharan2006@gmail.com"
    allow:
      - dependency-type: "all"
    ignore:
      - dependency-name: "python"
      - dependency-name: "pip"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    reviewers:
      - "suryahariharan2006@gmail.com"
