name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

# Node.js 24 became the default on 2026-06-16. Force it explicitly so the
# pinned @v4/@v5 action tags use Node 24 runtimes consistently.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ci:
    name: Run CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]" ruff pyright pip-audit build wheel

      - name: Ruff lint
        run: ruff check velune/

      - name: Ruff format
        run: ruff format --check velune/

      - name: Pyright
        run: pyright velune/

      - name: Tests
        run: pytest

      - name: Security checks
        run: |
          pip-audit
          if grep -rn "shell=True" velune/ 2>/dev/null; then
            echo "❌ FATAL: shell=True found in codebase"
            exit 1
          fi
          count=$(grep -rn "asyncio\.run(" velune/ --exclude="runner.py" | wc -l)
          if [ "$count" -gt 1 ]; then
            echo "❌ FATAL: Found $count asyncio.run() calls outside allowlist"
            exit 1
          fi


  build:
    name: Build Package
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG="$(python -c 'import velune; print(velune.__version__)')"
          if [ "$TAG" != "$PKG" ]; then
            echo "❌ Tag v$TAG does not match velune.__version__ ($PKG)"
            exit 1
          fi
          echo "✓ Tag matches package version: $PKG"

      - name: Build package (reproducible)
        run: |
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          python -m build

      - name: Validate metadata (twine check --strict)
        run: twine check --strict dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/velune-cli
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Uses the PYPI_TOKEN repo secret for API token auth.
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Get version from tag
        id: get_version
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "clean_version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          CLEAN_VERSION="${{ steps.get_version.outputs.clean_version }}"
          python3 - "$CLEAN_VERSION" > /tmp/changelog_body.txt << 'PYEOF'
          import re, sys
          from pathlib import Path

          version = sys.argv[1]
          changelog = Path("docs/CHANGELOG.md")
          if not changelog.exists():
              print(f"## Velune CLI v{version}\n\nSee the [full changelog](https://github.com/Surya-Hariharan/Velune-CLI/blob/main/docs/CHANGELOG.md) for details.")
              sys.exit(0)
          text = changelog.read_text(encoding="utf-8")

          # Match the section for this specific version, stopping at the next ## heading.
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          match = re.search(pattern, text, re.DOTALL)
          if match:
              body = match.group(1).strip()
              # Prepend a header so the GitHub release body is self-contained.
              header = (
                  f"## Velune CLI v{version}\n\n"
                  f"> **[Full changelog](https://github.com/Surya-Hariharan/Velune-CLI/blob/main/docs/CHANGELOG.md)** | "
                  f"**[PyPI](https://pypi.org/project/velune-cli/{version}/)** | "
                  f"**[Documentation](https://github.com/Surya-Hariharan/Velune-CLI/tree/main/docs)**\n\n"
              )
              print(header + body)
          else:
              print(
                  f"## Velune CLI v{version}\n\n"
                  f"See the [full changelog](https://github.com/Surya-Hariharan/Velune-CLI/blob/main/docs/CHANGELOG.md) for details."
              )
          PYEOF
          {
            echo "body<<CHANGELOG_EOF"
            cat /tmp/changelog_body.txt
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Velune CLI ${{ steps.get_version.outputs.clean_version }}"
          tag_name: ${{ steps.get_version.outputs.version }}
          files: dist/*
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
