name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  ci:
    name: Run CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" ruff pyright pip-audit build wheel

      - name: Ruff lint
        run: ruff check velune/ tests/

      - name: Ruff format
        run: ruff format --check velune/ tests/

      - name: Pyright
        run: pyright velune/

      - name: Security checks
        run: |
          pip-audit
          if grep -rn "shell=True" velune/ 2>/dev/null; then
            echo "❌ FATAL: shell=True found in codebase"
            exit 1
          fi
          count=$(grep -rn "asyncio\.run(" velune/ | wc -l)
          if [ "$count" -gt 1 ]; then
            echo "❌ FATAL: Found $count asyncio.run() calls"
            exit 1
          fi

      - name: Architecture lint
        run: python scripts/check_architecture.py

      - name: Unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=velune \
            --cov-fail-under=70

  build:
    name: Build Package
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/velune-cli
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          if [ -f CHANGELOG.md ]; then
            CHANGELOG=$(python -c "
import re
with open('CHANGELOG.md') as f:
    content = f.read()
    # Extract section for this version
    pattern = f'## \[{re.escape(VERSION)}\].*?(?=## \[|$)'
    match = re.search(pattern, content, re.DOTALL)
    if match:
        print(match.group(0).strip())
    else:
        print('Release notes not found in CHANGELOG.md')
            ")
            EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "body<<$EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "$EOF" >> $GITHUB_OUTPUT
          else
            echo "body=See commit history for changes" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
