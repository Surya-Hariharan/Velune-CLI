name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Node.js 24 became the default on 2026-06-16. Force it explicitly so the
# pinned @v4/@v5 action tags use Node 24 runtimes consistently.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Least-privilege default token: CI only needs to read the checkout. Any job
# that requires more must opt in explicitly with its own permissions block.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyright

      - name: Ruff lint check
        run: ruff check velune/

      - name: Ruff format check
        run: ruff format --check velune/

      - name: Pyright type checking
        run: pyright velune/

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # gitleaks needs full history to resolve push commit ranges

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # setuptools <83.0.0: PYSEC-2026-3447. actions/setup-python bundles
          # its own setuptools with the interpreter, independent of anything
          # velune pins, so it must be upgraded explicitly in this job.
          pip install --upgrade "setuptools>=83.0.0"
          pip install pip-audit "bandit[toml]"
          # Install the package so pip-audit sees velune's real runtime
          # dependency closure, not just pip-audit's own deps.
          pip install -e .

      - name: Check for pip vulnerabilities
        run: |
          # --skip-editable: velune-cli itself is installed editable (-e .)
          # and unpublished, so PyPI has no record to audit it against; that
          # skip is expected and doesn't affect coverage of its dependencies,
          # which are installed normally and audited as usual.
          pip-audit --skip-editable

      - name: Bandit static security scan
        # Gate on medium+ severity & confidence; full low-severity report is
        # printed for visibility but does not fail the build.
        run: |
          bandit -c pyproject.toml -r velune/ || true
          bandit -c pyproject.toml -r velune/ --severity-level medium --confidence-level medium

      - name: Bandit low-severity regression baseline
        # Low-severity findings (183 as of writing — mostly broad
        # try/except-pass patterns, not a mass rewrite worth blocking every
        # PR on) aren't part of the gate above, so nothing stops that count
        # from silently growing over time. This doesn't re-triage the
        # existing 183; it only fails if new ones are added. Raise
        # BASELINE_LOW deliberately, in the PR that adds the finding, only
        # after confirming it's reviewed and accepted — the same convention
        # already used for the asyncio.run() and create_subprocess_shell
        # allowlists above.
        run: |
          BASELINE_LOW=183
          bandit -c pyproject.toml -r velune/ -f json -o bandit_low.json --quiet || true
          count=$(python -c "import json; print(json.load(open('bandit_low.json'))['metrics']['_totals']['SEVERITY.LOW'])")
          rm -f bandit_low.json
          echo "Low-severity bandit findings: $count (baseline: $BASELINE_LOW)"
          if [ "$count" -gt "$BASELINE_LOW" ]; then
            echo "❌ FATAL: low-severity bandit findings grew from $BASELINE_LOW to $count."
            echo "Review the new finding(s); raise BASELINE_LOW in this file only once accepted."
            exit 1
          fi
          echo "✓ No low-severity regression"
          exit 0

      - name: Secret scan (gitleaks)
        # Run the gitleaks CLI directly rather than gitleaks/gitleaks-action:
        # the action calls the GitHub API to classify the account as an org
        # vs. individual, and when that call is rate-limited it fails closed
        # by demanding a paid license, even for personal/public repos.
        env:
          # Scan only the commits this push/PR actually introduces, not the
          # full repository history. Historical commits were already scanned
          # when they landed; re-scanning them on every subsequent run finds
          # nothing new and forces a permanently-growing allowlist for
          # synthetic test fixtures that were already confirmed safe.
          SCAN_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          SCAN_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.after }}
        run: |
          GITLEAKS_VERSION="8.30.1"
          curl -sSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          if [ -n "$SCAN_BASE" ] && [ "$SCAN_BASE" != "0000000000000000000000000000000000000000" ]; then
            ./gitleaks detect --source . --redact -v --log-opts="${SCAN_BASE}..${SCAN_HEAD}"
          else
            # New branch / no comparable base (e.g. first push) — scan just
            # the tip commit via git rather than the entire history.
            ./gitleaks detect --source . --redact -v --log-opts="-1"
          fi
          rm -f gitleaks gitleaks.tar.gz

      - name: Check for shell=True usage (P0-2 regression)
        run: |
          if grep -rn "shell=True" velune/ 2>/dev/null; then
            echo "❌ FATAL: shell=True found in codebase (P0-2 regression)"
            exit 1
          fi
          echo "✓ No shell=True found"
          exit 0

      - name: Check for un-allowlisted create_subprocess_shell usage (P0-2b regression)
        run: |
          # asyncio.create_subprocess_shell() is functionally shell=True and was
          # invisible to the literal "shell=True" grep above. Every call site must
          # be a reviewed, trust-gated, user-configured-command path — currently
          # hooks/executor.py (session hooks, gated on workspace trust) and
          # cli/commands/file_commands.py (TOML custom slash commands). Any other
          # call site is a new, unreviewed shell-injection surface.
          hits=$(grep -rln "create_subprocess_shell" velune/ \
            --exclude="executor.py" --exclude="file_commands.py" 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "❌ FATAL: create_subprocess_shell found outside the reviewed allowlist (P0-2b regression)"
            echo "$hits"
            exit 1
          fi
          echo "✓ create_subprocess_shell usage matches the reviewed allowlist"
          exit 0

      - name: Check asyncio.run() count (P0-1 regression)
        run: |
          # plugins/runner.py is a subprocess worker — asyncio.run() there is intentional.
          count=$(grep -rn "asyncio\.run(" velune/ \
            --exclude="runner.py" | wc -l)
          if [ "$count" -gt 1 ]; then
            echo "❌ FATAL: Found $count asyncio.run() calls outside allowlist (P0-1 regression)"
            grep -rn "asyncio\.run(" velune/ --exclude="runner.py"
            exit 1
          fi
          echo "✓ asyncio.run() count is acceptable ($count)"
          exit 0

  test:
    name: Tests (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package with all extras + test tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run test suite
        run: pytest

  build:
    name: Build & Validate Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so SOURCE_DATE_EPOCH can be derived from the commit.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel (reproducible)
        run: |
          # Pin archive timestamps to the commit date so builds are
          # byte-for-byte reproducible (Hatchling honors SOURCE_DATE_EPOCH).
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH"
          python -m build

      - name: Validate metadata (twine check --strict)
        run: twine check --strict dist/*

      - name: Verify wheel is pure-python (no platform tag)
        run: |
          if ls dist/*.whl | grep -qv 'py3-none-any'; then
            echo "❌ Expected a single pure-python (py3-none-any) wheel"
            ls -lh dist/
            exit 1
          fi
          echo "✓ Pure-python wheel: $(ls dist/*.whl)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  build-go:
    name: Go Launcher (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: ext/go
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          # No external Go deps → no go.sum; disable dependency-path cache.
          cache: false

      - name: Build
        run: go build ./cmd/velune/...

      - name: Test
        run: go test -v ./cmd/velune/...

      - name: Vet
        run: go vet ./cmd/velune/...

  build-rust:
    name: Rust Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: ext/rust/velune-native
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ext/rust/velune-native/target
          # Hash Cargo.toml (always present) since Cargo.lock is generated by CI.
          key: ${{ runner.os }}-cargo-${{ hashFiles('ext/rust/velune-native/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Build Rust library
        run: cargo build --lib

      - name: Run unit tests
        run: cargo test --lib



  install-smoke:
    name: Wheel Install + REPL Smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download built wheel
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install the built wheel into a clean environment
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Install the wheel (not the source tree) to verify the published
          # artifact and its dependency closure resolve on every OS.
          python -m pip install dist/*.whl

      - name: REPL smoke test (entrypoint resolves, no import-time crash)
        shell: bash
        run: |
          velune --version
          velune --help
          # The console-script and module form must agree.
          python -m velune --version
          # Environment diagnostics must run without import-time crashes on
          # every supported interpreter (exit code ignored — warnings are fine).
          velune doctor check || true

  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [lint, security, test, build, install-smoke, build-go, build-rust]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.install-smoke.result }}" != "success" ] || \
             [ "${{ needs.build-go.result }}" != "success" ] || \
             [ "${{ needs.build-rust.result }}" != "success" ]; then
            echo "❌ One or more jobs failed"
            exit 1
          fi
          echo "✓ All CI checks passed"
          exit 0
