name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Node.js 24 became the default on 2026-06-16. Force it explicitly so the
# pinned @v4/@v5 action tags use Node 24 runtimes consistently.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Least-privilege default token: CI only needs to read the checkout. Any job
# that requires more must opt in explicitly with its own permissions block.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyright

      - name: Ruff lint check
        run: ruff check velune/

      - name: Ruff format check
        run: ruff format --check velune/

      - name: Pyright type checking
        run: pyright velune/

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # gitleaks needs full history to resolve push commit ranges

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit "bandit[toml]"
          # Install the package so pip-audit sees velune's real runtime
          # dependency closure, not just pip-audit's own deps.
          pip install -e .

      - name: Check for pip vulnerabilities
        run: pip-audit

      - name: Bandit static security scan
        # Gate on medium+ severity & confidence; full low-severity report is
        # printed for visibility but does not fail the build.
        run: |
          bandit -c pyproject.toml -r velune/ || true
          bandit -c pyproject.toml -r velune/ --severity-level medium --confidence-level medium

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"

      - name: Check for shell=True usage (P0-2 regression)
        run: |
          if grep -rn "shell=True" velune/ 2>/dev/null; then
            echo "❌ FATAL: shell=True found in codebase (P0-2 regression)"
            exit 1
          fi
          echo "✓ No shell=True found"
          exit 0

      - name: Check asyncio.run() count (P0-1 regression)
        run: |
          # plugins/runner.py is a subprocess worker — asyncio.run() there is intentional.
          count=$(grep -rn "asyncio\.run(" velune/ \
            --exclude="runner.py" | wc -l)
          if [ "$count" -gt 1 ]; then
            echo "❌ FATAL: Found $count asyncio.run() calls outside allowlist (P0-1 regression)"
            grep -rn "asyncio\.run(" velune/ --exclude="runner.py"
            exit 1
          fi
          echo "✓ asyncio.run() count is acceptable ($count)"
          exit 0

  test:
    name: Tests (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package with all extras + test tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run test suite
        run: pytest

  build:
    name: Build & Validate Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so SOURCE_DATE_EPOCH can be derived from the commit.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel (reproducible)
        run: |
          # Pin archive timestamps to the commit date so builds are
          # byte-for-byte reproducible (Hatchling honors SOURCE_DATE_EPOCH).
          export SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH"
          python -m build

      - name: Validate metadata (twine check --strict)
        run: twine check --strict dist/*

      - name: Verify wheel is pure-python (no platform tag)
        run: |
          if ls dist/*.whl | grep -qv 'py3-none-any'; then
            echo "❌ Expected a single pure-python (py3-none-any) wheel"
            ls -lh dist/
            exit 1
          fi
          echo "✓ Pure-python wheel: $(ls dist/*.whl)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  build-go:
    name: Go Launcher (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: ext/go
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          # No external Go deps → no go.sum; disable dependency-path cache.
          cache: false

      - name: Build
        run: go build ./cmd/velune/...

      - name: Test
        run: go test -v ./cmd/velune/...

      - name: Vet
        run: go vet ./cmd/velune/...

  build-rust:
    name: Rust Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: ext/rust/velune-native
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ext/rust/velune-native/target
          # Hash Cargo.toml (always present) since Cargo.lock is generated by CI.
          key: ${{ runner.os }}-cargo-${{ hashFiles('ext/rust/velune-native/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Build Rust library
        run: cargo build --lib

      - name: Run unit tests
        run: cargo test --lib

  benchmark-native:
    name: Benchmark sha256 (ubuntu, py3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin + build native wheel
        run: |
          pip install maturin
          cd ext/rust/velune-native
          maturin build --release --out /tmp/native-wheel
          pip install /tmp/native-wheel/*.whl

      - name: Install velune (for _native.py)
        run: pip install -e .

      - name: Run sha256 benchmark (informational — never fails on perf thresholds)
        run: |
          python scripts/benchmark_native.py \
            --json .benchmarks/sha256_latest.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-sha256
          path: .benchmarks/sha256_latest.json
          retention-days: 30

  benchmark-scan:
    name: Benchmark scan_directory (ubuntu, py3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin + build native wheel
        run: |
          pip install maturin
          cd ext/rust/velune-native
          maturin build --release --out /tmp/native-wheel
          pip install /tmp/native-wheel/*.whl

      - name: Install velune
        run: pip install -e .

      - name: Run scan benchmark (informational — never fails on perf thresholds)
        run: |
          python scripts/benchmark_scan.py \
            --json .benchmarks/scan_latest.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-scan
          path: .benchmarks/scan_latest.json
          retention-days: 30

  install-smoke:
    name: Wheel Install + REPL Smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download built wheel
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install the built wheel into a clean environment
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Install the wheel (not the source tree) to verify the published
          # artifact and its dependency closure resolve on every OS.
          python -m pip install dist/*.whl

      - name: REPL smoke test (entrypoint resolves, no import-time crash)
        shell: bash
        run: |
          velune --version
          velune --help
          # The console-script and module form must agree.
          python -m velune --version
          # Environment diagnostics must run without import-time crashes on
          # every supported interpreter (exit code ignored — warnings are fine).
          velune doctor check || true

  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [lint, security, test, build, install-smoke, build-go, build-rust, benchmark-native, benchmark-scan]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.install-smoke.result }}" != "success" ] || \
             [ "${{ needs.build-go.result }}" != "success" ] || \
             [ "${{ needs.build-rust.result }}" != "success" ] || \
             [ "${{ needs.benchmark-native.result }}" != "success" ] || \
             [ "${{ needs.benchmark-scan.result }}" != "success" ]; then
            echo "❌ One or more jobs failed"
            exit 1
          fi
          echo "✓ All CI checks passed"
          exit 0
