[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "velune"
dynamic = ["version"]
description = "Local-first multi-model AI developer CLI — council-based agents, persistent memory, repository cognition"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [
    { name = "Surya HA" }
]
keywords = ["ai", "cli", "llm", "ollama", "local-ai", "coding-assistant", "multi-agent", "agent", "autonomous"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Environment :: Console",
]

dependencies = [
    # Core
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    "toml>=0.10.2",
    "typer>=0.9.0",
    "rich>=13.7.0",
    "platformdirs>=4.2.0",
    "keyring>=24.0.0",
    "prompt-toolkit>=3.0.0",
    "pathspec>=0.12.0",

    # Providers
    "openai>=1.10.0",
    "anthropic>=0.18.0",
    "httpx>=0.26.0",

    # Memory
    "qdrant-client>=1.7.0",

    # Retrieval
    "rank-bm25>=0.2.2",

    # Repository
    "tree-sitter>=0.21.0",
    "tree-sitter-python>=0.21.0",
    "tree-sitter-typescript>=0.21.0",
    "tree-sitter-rust>=0.21.0",
    "tree-sitter-go>=0.21.0",
    "gitpython>=3.1.40",
    "networkx>=3.2.0",

    # Execution
    "psutil>=5.9.0",

    # Telemetry
    "opentelemetry-api>=1.22.0",
    "opentelemetry-sdk>=1.22.0",
    "opentelemetry-exporter-otlp>=1.22.0",

    # Utilities
    "orjson>=3.9.0",
    "tiktoken>=0.5.0",
    "mcp>=1.0.0",
]

[project.optional-dependencies]
ollama = []
gguf = ["gguf>=0.6.0", "llama-cpp-python>=0.2.0"]
all-providers = ["velune[gguf]"]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
    "pytest-mock>=3.12.0",
    "ruff>=0.1.0",
    "mypy>=1.8.0",
    "coverage>=7.0.0",
    "black>=23.12.0",
    "pre-commit>=3.6.0",
    "pytest-cov>=4.1.0",
]

[project.scripts]
velune = "velune.main:app"

[project.urls]
Homepage = "https://github.com/Surya-Hariharan/Velune-CLI"
Repository = "https://github.com/Surya-Hariharan/Velune-CLI"
Issues = "https://github.com/Surya-Hariharan/Velune-CLI/issues"
Documentation = "https://github.com/Surya-Hariharan/Velune-CLI#readme"

[tool.hatch.version]
path = "velune/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["velune"]

[tool.hatch.build.targets.sdist]
include = [
    "velune/",
    "README.md",
    "LICENSE",
    "CHANGELOG.md",
]

[tool.black]
line-length = 100
target-version = ["py311", "py312"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--tb=short --strict-markers"
markers = [
    "integration: marks tests requiring real filesystem or subprocess",
    "slow: marks tests taking > 1 second",
]

[tool.coverage.run]
source = ["velune"]
omit = ["velune/cli/*", "velune/__main__.py"]
